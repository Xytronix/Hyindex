name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        working-directory: hyindex-plugin
        run: ./gradlew build

      - name: Shadow JARs
        working-directory: hyindex-plugin
        run: ./gradlew :indexer-cli:shadowJar :mcp-server:shadowJar

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyindex-jars
          path: |
            hyindex-plugin/indexer-cli/build/libs/hyindex-knowledge-indexer.jar
            hyindex-plugin/mcp-server/build/libs/hyindex-knowledge-mcp.jar
