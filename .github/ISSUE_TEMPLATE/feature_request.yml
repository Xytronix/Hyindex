name: Feature Request
description: Suggest a new feature or improvement for Hyindex
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Hyindex? Describe what you'd like and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what workflow does it improve?
      placeholder: I find it frustrating when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Hyindex does this relate to?
      options:
        - Knowledge / Indexing
        - MCP Server
        - Search / Embeddings
        - Settings / Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, examples, links, or anything else that helps explain the request.
