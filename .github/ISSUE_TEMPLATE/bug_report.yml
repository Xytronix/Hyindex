name: Bug Report
description: Report a bug or unexpected behavior in Hyindex
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the sections below so we can reproduce and fix it.

  - type: input
    id: hyindex-version
    attributes:
      label: Hyindex Version
      description: Which version / commit of Hyindex are you using?
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true

  - type: input
    id: hytale-version
    attributes:
      label: Hytale Version
      description: Which Hytale patchline/version you indexed against, if applicable?
      placeholder: e.g. release / pre-release slug

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Build the indexer JAR
        2. Run with...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Traces
      description: Paste any relevant logs or stack traces.
      render: shell
